version: '3.8'

services:
  ai-auto-tunneler:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: ai-auto-tunneler-enhanced
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - tunneler_data:/app/data
      - tunneler_logs:/app/logs
      - tunneler_config:/app/config
    networks:
      - tunneler_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tunneler.rule=Host(`tunneler.localhost`)"
      - "traefik.http.services.tunneler.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching (future enhancement)
  redis:
    image: redis:7-alpine
    container_name: ai-tunneler-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - tunneler_network
    profiles:
      - with-redis

  # Optional: Prometheus monitoring (future enhancement)
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-tunneler-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - tunneler_network
    profiles:
      - monitoring

  # Optional: Grafana dashboards (future enhancement)
  grafana:
    image: grafana/grafana:latest
    container_name: ai-tunneler-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - tunneler_network
    profiles:
      - monitoring

volumes:
  tunneler_data:
    driver: local
  tunneler_logs:
    driver: local
  tunneler_config:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  tunneler_network:
    driver: bridge
