# Prometheus configuration for AI Auto Tunneler Enhanced

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ai-auto-tunneler"
    static_configs:
      - targets: ["ai-auto-tunneler:8080"]
    metrics_path: "/metrics"
    scrape_interval: 30s
    params:
      format: ['prometheus']

  - job_name: "ai-tunneler-health"
    static_configs:
      - targets: ["ai-auto-tunneler:8080"]
    metrics_path: "/health"
    scrape_interval: 10s
